{
  "policy_id": "GOV-TEST-CHECKPOINT-CONDITIONAL",
  "policy_version": "1.0",
  "description": "Checkpoint with evidence-based triggers",
  "action_classes": [
    {
      "name": "cad_update.address",
      "controlling_entity": {"role": "call_taker", "escalation_target": "supervisor"},
      "autonomy_level": "A3",
      "operators": {
        "bound": [
          {"rule_id": "bound_address_normalize", "transform": "normalize_address"}
        ],
        "checkpoint": [
          {"rule_id": "checkpoint_if_conflict", "trigger": "conflicting_evidence_detected", "approver": "call_taker", "timeout_ms": 30000},
          {"rule_id": "checkpoint_if_evidence_sparse", "trigger": "evidence_count < 2", "approver": "call_taker", "timeout_ms": 30000}
        ],
        "escalate": [
          {"rule_id": "escalate_from_defer", "condition": "uncertainty.conflict == true", "target": "supervisor", "fallback": "revert_to_A1"}
        ],
        "audit": {"capture": ["input", "output", "decision", "timestamp", "evidence_refs"]}
      },
      "evidence_requirements": {
        "checkpoint_presentation": ["uncertainty_markers", "source_utterance_spans"],
        "audit_capture": ["all"]
      }
    }
  ]
}
