{
  "action_classes": [
    {
      "name": "cad_update.address",
      "description": "Update incident location in CAD",
      "payload_schema": {
        "type": "object",
        "properties": {
          "location": {"type": "string"},
          "city": {"type": "string"},
          "cross_streets": {"type": "string"}
        },
        "required": ["location"]
      },
      "required_evidence": ["human_communication"],
      "risk_level": "high",
      "cad_fields_written": ["location", "city", "cross_streets"],
      "critical_fields": ["location"],
      "freshness_strategy": "occ",
      "rollback_semantics": {"reversible": true, "rollback_mechanism": "restore_previous_fields", "rollback_window_ms": 600000},
      "authorized_data_sources": ["canada_post_api", "municipal_geo"]
    },
    {
      "name": "cad_update.narrative",
      "description": "Append or replace CAD narrative",
      "payload_schema": {
        "type": "object",
        "properties": {
          "narrative": {"type": "string"},
          "append": {"type": "boolean"}
        },
        "required": ["narrative"]
      },
      "required_evidence": ["human_communication"],
      "risk_level": "medium",
      "cad_fields_written": ["narrative"],
      "critical_fields": [],
      "freshness_strategy": "occ",
      "rollback_semantics": {"reversible": true, "rollback_mechanism": "replace_narrative", "rollback_window_ms": 600000},
      "authorized_data_sources": []
    },
    {
      "name": "cad_update.caller_phone_number",
      "description": "Update callback number",
      "payload_schema": {
        "type": "object",
        "properties": {
          "caller_phone_number": {"type": "string", "pattern": "^\\+?[0-9\\-]+$"}
        },
        "required": ["caller_phone_number"]
      },
      "required_evidence": ["human_communication"],
      "risk_level": "medium",
      "cad_fields_written": ["caller_phone_number"],
      "critical_fields": ["caller_phone_number"],
      "freshness_strategy": "occ",
      "rollback_semantics": {"reversible": true, "rollback_mechanism": "restore_previous_fields", "rollback_window_ms": 600000},
      "authorized_data_sources": []
    },
    {
      "name": "nlp.translate_stream",
      "description": "Real-time translation assistance",
      "payload_schema": {
        "type": "object",
        "properties": {
          "source_lang": {"type": "string"},
          "target_lang": {"type": "string"},
          "text": {"type": "string"}
        },
        "required": ["source_lang", "target_lang", "text"]
      },
      "required_evidence": [],
      "risk_level": "low",
      "cad_fields_written": [],
      "critical_fields": [],
      "freshness_strategy": "none",
      "rollback_semantics": {"reversible": true, "rollback_mechanism": "noop", "rollback_window_ms": 1000},
      "authorized_data_sources": []
    }
  ]
}
